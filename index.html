<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOOGLE FORM</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to right,#141e30,#243b55);
    }

    .container{
      width:400px;
      background:white;
      padding:40px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      text-align:center;
    }

    h1{
      margin-bottom:10px;
      color:#243b55;
      font-size:32px;
    }

    p{
      margin-bottom:25px;
      color:gray;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#243b55;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#141e30;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Welcome To My Page 🚀</h1>

    <p>Enter your details below</p>

    <form action="/submit" method="POST">

      <input
        type="text"
        name="name"
        placeholder="Enter your name"
        required
      >

      <input
        type="email"
        name="email"
        placeholder="Enter your email"
        required
      >

      <input
        type="number"
        name="age"
        placeholder="Enter your age"
        required
      >

      <button type="submit">
        Submit
      </button>

    </form>

  </div>

</body>
</html>
