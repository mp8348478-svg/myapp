name: EC2 Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to EC2
        uses: appleboy/ssh-action@master
        with:
          host: 98.87.4.247
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd myapp
            git pull
            docker-compose down
            docker-compose up -d --build
            
