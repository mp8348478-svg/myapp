name: EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: "98.87.4.247"
          username: "ec2-user"
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd myapp
            git pull
            sudo docker-compose down
            sudo docker-compose up -d --build

